<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <table border="1px solid black" style="border-collapse: collapse;">
        <caption>Information Table</caption>

        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Address</th>
        </tr>
        <tr>
            <td>101</td>
            <td>Prachi</td>
            <td>Pune</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Ram</td>
            <td>Mumbai</td>
        </tr>
        <tr>
            <td>103</td>
            <td>Harry</td>
            <td>Karad</td>
        </tr>
    </table>
</body>
</html>
